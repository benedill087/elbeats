<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ElbEats</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b1220;
  color: white;
}

/* HEADER */
header {
  padding: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  font-weight: bold;
  font-size: 18px;
}

.status {
  font-size: 13px;
}

/* PRODUKTE */
.products {
  padding: 15px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
}

.card {
  background: #111827;
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 0 15px rgba(0,0,0,0.4);
}

.card img {
  width: 100%;
  height: 160px;
  object-fit: contain;
  background: #202020;
  padding: 15px;
  border-radius: 12px;
}
}

.card-content {
  padding: 10px;
}

.price {
  color: #22c55e;
  font-weight: bold;
}

button {
  width: 100%;
  padding: 8px;
  margin-top: 6px;
  background: #22c55e;
  border: none;
  border-radius: 8px;
  color: white;
}

/* CART */
.cart {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #020617;
  padding: 10px;
  border-top: 1px solid #111;
}

.cart-item {
  display: flex;
  justify-content: space-between;
  font-size: 14px;
}

.total {
  margin-top: 5px;
  color: #22c55e;
}

input {
  width: 100%;
  padding: 8px;
  margin-top: 5px;
  border-radius: 8px;
  border: none;
}
</style>
</head>

<div class="cart">
<div id="cart"></div>
<div class="total">Gesamt: <span id="total">0</span>€</div>

<input id="name" placeholder="Name">
<input id="adresse" placeholder="Adresse">

<button onclick="order()">Bestellen</button>
</div>

<script>
let items = {};

// Produkt hinzufügen
function add(name, price) {
  if (!items[name]) {
    items[name] = { price: price, qty: 0 };
  }
  items[name].qty++;
  update();
}

// Produkt entfernen
function remove(name) {
  if (!items[name]) return;
  items[name].qty--;
  if (items[name].qty <= 0) {
    delete items[name];
  }
  update();
}

// Warenkorb aktualisieren
function update() {
  const cart = document.getElementById("cart");
  const totalEl = document.getElementById("total");

  cart.innerHTML = "";
  let total = 0;

  for (let item in items) {
    let div = document.createElement("div");
    div.className = "cart-item";

    div.innerHTML = `
      ${item} x${items[item].qty}
      <button onclick="remove('${item}')">X</button>
    `;

    cart.appendChild(div);
    total += items[item].price * items[item].qty;
  }

  totalEl.textContent = total;
}

// Öffnungszeiten anzeigen
function updateStatus() {
  const status = document.getElementById("status");
  const hour = new Date().getHours();

  if (hour >= 16 && hour < 20) {
    status.textContent = "🟢 Geöffnet (16–20 Uhr)";
    status.style.color = "#22c55e";
  } else {
    status.textContent = "🔴 Geschlossen";
    status.style.color = "red";
  }
}

updateStatus();

// Bestellung senden
function order() {
  const name = document.getElementById("name").value.trim();
  const adresse = document.getElementById("adresse").value.trim();

  if (!name || !adresse) {
    alert("Bitte Name und Adresse eingeben!");
    return;
  }

  if (Object.keys(items).length === 0) {
    alert("Warenkorb ist leer!");
    return;
  }

  let text = "🛒 **Neue Bestellung**\n";
  text += "👤 Name: " + name + "\n";
  text += "📍 Adresse: " + adresse + "\n\n";

  let total = 0;

  for (let item in items) {
    text += `• ${item} x${items[item].qty}\n`;
    total += items[item].price * items[item].qty;
  }

  text += "\n💰 Gesamt: " + total + "€";

  fetch("https://discord.com/api/webhooks/1499086413021450310/d5PAX1hMmNpJncotuVLFYRc4TFMMzlr3WzBTkojmPMRVh9QF1SILDkX26fBiLBziA8FO", {
    method: "POST",
  body: JSON.stringify({
    content: text
  }),
  headers: {
    "Content-Type": "application/json"
  },
  mode: "no-cors"
});
  })
  .then(() => {
    alert("✅ Bestellung gesendet!");
    items = {};
    update();
  })
  .catch(() => {
    alert("❌ Fehler beim Senden!");
  });
}
</script>
