<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ElbEats</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b1220;
  color: white;
}

/* HEADER */
header {
  padding: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  font-weight: bold;
}

.status {
  font-size: 13px;
}

/* PRODUKTE */
.products {
  padding: 15px;
  display: grid;
  gap: 15px;
}

.card {
  background: #111827;
  border-radius: 12px;
  overflow: hidden;
}

.card img {
  width: 100%;
  height: 150px;
  object-fit: cover;
}

.card-content {
  padding: 10px;
}

.price {
  color: #22c55e;
}

button {
  margin-top: 8px;
  width: 100%;
  padding: 10px;
  background: #22c55e;
  border: none;
  border-radius: 8px;
  color: white;
}

/* CART */
.cart {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #020617;
  padding: 15px;
}

.cart-item {
  display: flex;
  justify-content: space-between;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border-radius: 8px;
  border: none;
}

.total {
  margin-top: 10px;
  color: #22c55e;
}
</style>
</head>

<body>

<header>
  <div class="logo">🍔 ElbEats</div>
  <div class="status" id="status">...</div>
</header>

<div class="products">

<div class="card">
<img src="https://images.unsplash.com/photo-1542990253-0d0f5be5f0ed">
<div class="card-content">
<h3>Heiße Schokolade</h3>
<div class="price">2000€</div>
<button onclick="add('Schokolade',2000)">+</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1567306226416-28f0efdc88ce">
<div class="card-content">
<h3>Apfel</h3>
<div class="price">1000€</div>
<button onclick="add('Apfel',1000)">+</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1600271886742-f049cd5bba1c">
<div class="card-content">
<h3>Energy Drink</h3>
<div class="price">250€</div>
<button onclick="add('Energy',250)">+</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1558961363-fa8fdf82db35">
<div class="card-content">
<h3>Kekse</h3>
<div class="price">500€</div>
<button onclick="add('Kekse',500)">+</button>
</div>
</div>

</div>

<div class="cart">
<div id="cart"></div>
<div class="total">Gesamt: <span id="total">0</span>€</div>

<input id="name" placeholder="Name">
<input id="adresse" placeholder="Adresse">

<button onclick="order()">Bestellen</button>
</div>

<script>
let items = {};

function add(name, price) {
  if (!items[name]) items[name] = {price: price, qty: 0};
  items[name].qty++;
  update();
}

function remove(name) {
  items[name].qty--;
  if (items[name].qty <= 0) delete items[name];
  update();
}

function update() {
  let cart = document.getElementById("cart");
  cart.innerHTML = "";
  let total = 0;

  for (let name in items) {
    let item = items[name];
    let div = document.createElement("div");
    div.className = "cart-item";

    div.innerHTML = `
      ${name} x${item.qty}
      <button onclick="remove('${name}')">X</button>
    `;

    cart.appendChild(div);
    total += item.price * item.qty;
  }

  document.getElementById("total").textContent = total;
}

function updateStatus() {
  let hour = new Date().getHours();
  let status = document.getElementById("status");

  if (hour >= 16 && hour < 20) {
    status.textContent = "🟢 Geöffnet";
    status.style.color = "#22c55e";
  } else {
    status.textContent = "🔴 Geschlossen";
    status.style.color = "red";
  }
}

updateStatus();

function order() {
  let name = document.getElementById("name").value;
  let adresse = document.getElementById("adresse").value;

  let text = `🛒 Bestellung\n${name}\n${adresse}\n`;

  for (let item in items) {
    text += `${item} x${items[item].qty}\n`;
  }

  fetch("https://discord.com/api/webhooks/1498386548838633677/EV45LQzX0HFRqYhNuF-2XWFw7eUXVC59WWrGT6Th76Yb65zEckweiP8vYUGkuXkHVgE-", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({content: text})
  });

  alert("Gesendet!");
}
</script>

</body>
</html>
