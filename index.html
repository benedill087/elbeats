<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ElbEats Hamburg</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  padding: 15px 20px;
  flex-wrap: wrap;
  gap: 10px;
}

.logo {
  font-size: 20px;
  font-weight: bold;
}

.info {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.badge {
  background: rgba(255,255,255,0.05);
  padding: 8px 12px;
  border-radius: 20px;
  font-size: 13px;
}

/* LAYOUT */
.container {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 20px;
  padding: 15px;
}

/* CARDS */
.card {
  background: rgba(255,255,255,0.05);
  border-radius: 15px;
  padding: 15px;
}

/* PRODUCTS */
.products {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
}

.product img {
  width: 100%;
  border-radius: 10px;
}

.price {
  color: #22c55e;
}

button {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #22c55e;
  color: white;
  cursor: pointer;
}

/* CART */
.cart-item {
  display: flex;
  justify-content: space-between;
  margin: 8px 0;
}

.remove {
  background: red;
  border: none;
  color: white;
  padding: 5px;
  cursor: pointer;
}

.total {
  margin-top: 10px;
  color: #22c55e;
}

/* INPUT */
input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  background: rgba(255,255,255,0.05);
  color: white;
}

/* MOBILE */
@media (max-width: 800px) {
  .container {
    display: flex;
    flex-direction: column;
  }

  .products {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<header>
  <div class="logo">🍔 ElbEats Hamburg</div>

  <div class="info">
    <div class="badge">🕒 16:00 - 20:00</div>
    <div class="badge" id="status">Status...</div>
  </div>
</header>

<div class="container">

<!-- PRODUKTE -->
<div class="card">
<div class="products">

<div class="product">
<img src="https://images.unsplash.com/photo-1511920170033-f8396924c348">
<h3>Heiße Schokolade</h3>
<div class="price">2000€</div>
<button onclick="add('Schokolade',2000)">Hinzufügen</button>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1567306226416-28f0efdc88ce">
<h3>Apfel</h3>
<div class="price">1000€</div>
<button onclick="add('Apfel',1000)">Hinzufügen</button>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1622543925917-763c34c68d30">
<h3>Energy Drink</h3>
<div class="price">250€</div>
<button onclick="add('Energy',250)">Hinzufügen</button>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1558961363-fa8fdf82db35">
<h3>Kekse</h3>
<div class="price">500€</div>
<button onclick="add('Kekse',500)">Hinzufügen</button>
</div>

</div>
</div>

<!-- WARENKORB -->
<div class="card">

<h3>🛒 Warenkorb</h3>

<div id="cart"></div>

<div class="total">Gesamt: <span id="total">0</span>€</div>

<input id="name" placeholder="Dein Name">
<input id="adresse" placeholder="Adresse">

<button onclick="order()">Bestellen</button>

</div>

</div>

<script>
let items = {};

// hinzufügen
function add(name, price) {
  if (!items[name]) items[name] = {price: price, qty: 0};
  items[name].qty++;
  update();
}

// entfernen
function remove(name) {
  items[name].qty--;
  if (items[name].qty <= 0) delete items[name];
  update();
}

// update cart
function update() {
  let cart = document.getElementById("cart");
  cart.innerHTML = "";
  let total = 0;

  for (let name in items) {
    let item = items[name];

    let div = document.createElement("div");
    div.className = "cart-item";

    div.innerHTML = `
      ${name} x${item.qty} (${item.price * item.qty}€)
      <button class="remove" onclick="remove('${name}')">X</button>
    `;

    cart.appendChild(div);
    total += item.price * item.qty;
  }

  document.getElementById("total").textContent = total;
}

// status
function updateStatus() {
  const hour = new Date().getHours();
  const status = document.getElementById("status");

  if (hour >= 16 && hour < 20) {
    status.textContent = "🟢 Geöffnet";
    status.style.color = "#22c55e";
  } else {
    status.textContent = "🔴 Geschlossen";
    status.style.color = "red";
  }
}

updateStatus();

// bestellen (Discord)
function order() {
  let name = document.getElementById("name").value;
  let adresse = document.getElementById("adresse").value;

  if (!name || !adresse) {
    alert("Bitte alles ausfüllen!");
    return;
  }

  let text = `🛒 Bestellung\nName: ${name}\nAdresse: ${adresse}\n`;

  for (let item in items) {
    text += `${item} x${items[item].qty}\n`;
  }

  text += `Gesamt: ${document.getElementById("total").textContent}€`;

  fetch("https://discord.com/api/webhooks/1498386548838633677/EV45LQzX0HFRqYhNuF-2XWFw7eUXVC59WWrGT6Th76Yb65zEckweiP8vYUGkuXkHVgE-", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({content: text})
  });

  alert("Bestellung gesendet!");
  items = {};
  update();
}
</script>

</body>
</html>
