<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ElbEats</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b1220;
  color: white;
}

/* LOADING */
#loading {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #020617;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 28px;
  font-weight: bold;
  z-index: 999;
}

/* START SCREEN */
#start {
  display: none;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  gap: 20px;
}

.start-btn {
  padding: 15px 25px;
  background: #22c55e;
  border: none;
  border-radius: 10px;
  font-size: 18px;
}

/* APP */
#app {
  display: none;
}

/* HEADER */
header {
  padding: 15px;
  display: flex;
  justify-content: space-between;
}

/* PRODUKTE */
.products {
  padding: 15px;
  display: grid;
  gap: 15px;
}

.card {
  background: #111827;
  border-radius: 12px;
  overflow: hidden;
}

.card img {
  width: 100%;
  aspect-ratio: 1 / 1;
  object-fit: cover;
  object-position: center;
}

.card-content {
  padding: 10px;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  background: #22c55e;
  border: none;
  border-radius: 8px;
  color: white;
}

/* CART */
.cart {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #020617;
  padding: 10px;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border-radius: 8px;
  border: none;
}
</style>
</head>

<body>

<div id="loading">🍔 ElbEats lädt...</div>

<div id="start">
  <h1>🍔 ElbEats</h1>
  <button class="start-btn" onclick="openMenu()">Menü öffnen</button>
</div>

<div id="app">

<header>
  <div>ElbEats</div>
  <div id="status"></div>
</header>

<div class="products">

<div class="card">
<img src="https://picsum.photos/400/200?1" onerror="this.src='https://via.placeholder.com/400x200'">
<div class="card-content">
<h3>Heiße Schokolade</h3>
<button onclick="add('Schokolade',2000)">+</button>
</div>
</div>

<div class="card">
<img src="https://picsum.photos/400/200?2" onerror="this.src='https://via.placeholder.com/400x200'">
<div class="card-content">
<h3>Apfel</h3>
<button onclick="add('Apfel',1000)">+</button>
</div>
</div>

<div class="card">
<img src="https://picsum.photos/400/200?3" onerror="this.src='https://via.placeholder.com/400x200'">
<div class="card-content">
<h3>Energy</h3>
<button onclick="add('Energy',250)">+</button>
</div>
</div>

<div class="card">
<img src="https://picsum.photos/400/200?4" onerror="this.src='https://via.placeholder.com/400x200'">
<div class="card-content">
<h3>Kekse</h3>
<button onclick="add('Kekse',500)">+</button>
</div>
</div>

</div>

<div class="cart">
<div id="cart"></div>
<input id="name" placeholder="Name">
<input id="adresse" placeholder="Adresse">
<button onclick="order()">Bestellen</button>
</div>
 
}

</div>

<script>
// loading
setTimeout(() => {
  document.getElementById("loading").style.display = "none";
  document.getElementById("start").style.display = "flex";
}, 1500);

// open menu
function openMenu() {
  document.getElementById("start").style.display = "none";
  document.getElementById("app").style.display = "block";
}

// status
function updateStatus() {
  let hour = new Date().getHours();
  let status = document.getElementById("status");

  if (hour >= 16 && hour < 20) {
    status.textContent = "🟢 Geöffnet";
  } else {
    status.textContent = "🔴 Geschlossen";
  }
}
updateStatus();

// cart
let items = {};

function add(name, price) {
  if (!items[name]) items[name] = {price: price, qty: 0};
  items[name].qty++;
  update();
}

function update() {
  let cart = document.getElementById("cart");
  cart.innerHTML = "";

  for (let item in items) {
    let div = document.createElement("div");
    div.innerHTML = `${item} x${items[item].qty}`;
    cart.appendChild(div);
  }
}

// order
function order() {
  let name = document.getElementById("name").value;
  let adresse = document.getElementById("adresse").value;

  let text = `Bestellung\n${name}\n${adresse}\n`;

  for (let item in items) {
    text += `${item} x${items[item].qty}\n`;
  }

  fetch("https://discord.com/api/webhooks/1498386548838633677/EV45LQzX0HFRqYhNuF-2XWFw7eUXVC59WWrGT6Th76Yb65zEckweiP8vYUGkuXkHVgE-", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({content: text})
  });

  alert("Gesendet!");
}
</script>

</body>
</html>
