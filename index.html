<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>ElbEats</title>
<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  text-align: center;
}

.card {
  background: #222;
  padding: 20px;
  margin: 20px;
  border-radius: 10px;
}

button {
  padding: 10px;
  background: #00a8a8;
  border: none;
  color: white;
  cursor: pointer;
}
</style>
</head>
<body>

<h1>🍔 ElbEats Hamburg</h1>

<div class="card">
  <h2>☕ Heiße Schokolade</h2>
  <p>2000€</p>
  <button onclick="add('Heiße Schokolade', 2000)">Bestellen</button>
</div>

<div class="card">
  <h2>🍎 Apfel</h2>
  <p>1000€</p>
  <button onclick="add('Apfel', 1000)">Bestellen</button>
</div>

<div class="card">
  <h2>⚡ Energy Drink</h2>
  <p>250€</p>
  <button onclick="add('Energy', 250)">Bestellen</button>
</div>

<div class="card">
  <h2>🍪 Kekse</h2>
  <p>500€</p>
  <button onclick="add('Kekse', 500)">Bestellen</button>
</div>

<h2>🛒 Warenkorb</h2>
<ul id="cart"></ul>
<p>Gesamt: <span id="total">0</span>€</p>

<script>
let total = 0;
let items = {};

function add(name, price) {
  if (!items[name]) {
    items[name] = { price: price, qty: 0 };
  }

  items[name].qty++;

  updateCart();
}

function updateCart() {
  const cart = document.getElementById("cart");
  cart.innerHTML = "";
  total = 0;

  for (let name in items) {
    const item = items[name];
    const li = document.createElement("li");
    li.textContent = name + " x" + item.qty + " = " + (item.price * item.qty) + "€";
    cart.appendChild(li);
    total += item.price * item.qty;
  }

  document.getElementById("total").textContent = total;
}
</script>

</body>
</html>
